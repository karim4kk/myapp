name: Final Build APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # حل مشكلة التنبيه التي ظهرت لك

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Extract Project
        run: |
          unzip -o *.zip
          # هذا الأمر سيبحث عن ملف pubspec في كل المجلدات وينقل الملفات للمكان الصحيح
          PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project found in: $PROJECT_DIR"
          cp -rn $PROJECT_DIR/* . || true

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: build/app/outputs/flutter-apk/app-release.apk
