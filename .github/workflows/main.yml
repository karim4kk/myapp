name: Build APK from Zip

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث للنسخة 4

      - name: Setup Java
        uses: actions/setup-java@v4 # تحديث للنسخة 4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Unzip and Move Files
        run: |
          unzip *.zip
          # البحث عن ملف pubspec لنقل الملفات للمجلد الرئيسي
          find . -maxdepth 2 -name "pubspec.yaml" -execdir cp -r . ../ \; || true

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4 # هذا هو التعديل الأهم لحل مشكلتك
        with:
          name: My-Final-App
          path: build/app/outputs/flutter-apk/app-release.apk
